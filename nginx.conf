server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /stream/ {
        proxy_pass http://go2rtc:1984/;
        proxy_hide_header WWW-Authenticate;
        add_header Access-Control-Allow-Origin *;
        # HLS playlists must never be cached — session IDs change on restart
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        # WebSocket support (needed for go2rtc MSE/WebRTC)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # go2rtc embeds absolute /api/hls/ paths inside its m3u8 playlists —
    # proxy them directly so hls.js can follow them without the /stream/ prefix.
    location /api/hls/ {
        proxy_pass http://go2rtc:1984/api/hls/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /proxy/blackboard/ {
        proxy_pass https://blackboard.jass.school/;
        proxy_ssl_server_name on;
        proxy_set_header Host blackboard.jass.school;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_hide_header WWW-Authenticate;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
