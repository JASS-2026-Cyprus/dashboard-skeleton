version: '3.8'

services:
  cockpit-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUBSYSTEMS_CONFIG: |
          {
            "subsystems": {
              "air_quality": {
                "backendUrl": "${AIR_QUALITY_BACKEND_URL}"
              },
              "waterQuality": {
                "backendUrl": "${WATER_QUALITY_BACKEND_URL}"
              },
              "maintenance": {
                "backendUrl": "${MAINTENANCE_BACKEND_URL}"
              },
              "earthquake": {
                "backendUrl": "${EARTHQUAKE_BACKEND_URL}"
              }
            }
          }
    ports:
      - "8000:80"
    restart: unless-stopped
    depends_on:
      - go2rtc

  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984"
      - "8554:8554"
    restart: unless-stopped
